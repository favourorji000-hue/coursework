<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin dashboard</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --border: #d9e1e8;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #334155;
            --primary-soft: #e2e8f0;
            --acent: #0f172a;
            --success: #166534;
            --success-bg: #dcfce7;
            --warning: #92400e;
            --warning-bg: #b91c1c;
            --danger: #b91c1c;
            --danger-bg: #fee2e2;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        .app {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 260px 1fr;
        }

        .sidebar {
            background: var(--accent);
            color:#d9e1e8;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px
        }

        .brand h1 {
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: 0.02em;    
        }

        .brand p {
            margin: 8px 0 0;
            color:#dcfce7;
            font-size: 0.95rem
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-btn {
            width: 100%;
            border: 1px solid transparent;
            background:blue;
            color:#dcfce7;
            padding: 14px 16px;
            text-align: left;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s ease;
            font-weight: 600;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .main {
            padding: 28px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .topbar h2 {
            margin: 0;
            font-size: 1.75rem;
        }

        .topbar p {
            margin: 6px 0 0;
            color: var(--muted);
        }

        .stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            border-radius: 14px;
            padding: 14px 18px;
            width: 150px
        }

        .stat-card span {
            display: block;
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .stat-card strong {
            font-size: 1.35rem;
        }

        .section {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 22px;
            align-items: start;
        }

        .card-header {
            padding: 20px 20px 10px
        }

        .card-header h3 {
            margin: auto;
            font-size: 1.1rem;
        }

        .card-header p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 1.1rem;
        }

        .card-body {
            padding: 20px;
        }

        form {
            display: grid;
            gap: 14px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 12px;
            padding: 11px 13px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #94a3b8;
            box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.18);
        }

        .error{
            color: var(--danger);
            font-size: 0.84rem;
            min-height: 1em;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 11px 16px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s ease;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover { background: #d5deea}

        .btn-danger {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .btn-small {
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 20px 20px 0;
            flex-wrap: wrap;
        }

        .toolbar h3 {
            margin: 0;
        }

        .table-wrap {
            overflow-x: auto;
            padding: 16px 20px 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width:760px;
        }

        th,
        td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }

        th {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var (--muted);
            background: var(--surface-2);
        }

        tr:hover td {
            background: #fbfdff;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-available,
        .status-active {
            color: var(--success);
            background: var(--success-bg);
        }

        .status-unavailable,
        .status-suspended {
            color: var(--warning);
            background: var(--warning-bg);
        }

        .action {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .empty-state {
            padding: 26px 20px;
            color: var(--muted);
            text-align: center;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            width: min(680px, 100%);
            max-height: 90vh;
            overflow-y: auto;
            background: var(--surface);
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.25)
        }

        .modal-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;

        }

        .modal-header h3 {
            margin: 0;
        }

        .close-btn {
            border: none;
            background: transparent;
            font-size: 1.35rem;
            cursor: pointer;
            color: var(--muted);
        }

        .modal-body {
            padding: 20px;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .muted {
            color: var(--muted);
        }

        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 780px) {
            .app {
                grid-template-columns: 1fr;
            }

            .sidebar {
                padding: 20px;
            }

            .nav {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .nav-btn {
                flex: 1 1 220px;
            }

            .main {
                padding: 18px;
            }

            .two-col {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">
                <h1>Admin panel</h1>
                <p>Equipment inventory and user account dashboard</p>
            </div>

            <nav class="nav">
                <button class="nav-btn active" data-section="equimentsection">Equipment Management</button>
                <button class="nav-btn active" data-section="usersection">User Management</button>
            </nav>
        </aside>

        <main class="main">
            <div class="topbar">
            </div>
            <h2 id="pageTitle">Euipment Management</h2>
            <p id="pagesubtitle">Track rental inventory, update stock, and manage availability.</p>
        </div>
        <div class="stats" id="statscontainer">
        </div>

        <section id="equipmentsection" class="section active">

        </section>
        </main>
    </div>
    
</body>
</html>
